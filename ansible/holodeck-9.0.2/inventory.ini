# =============================================================================
# Holodeck 9.0.2 – Inventory
# =============================================================================
# The main playbook runs on localhost (Ansible control node) and interacts
# with the physical ESXi host via the community.vmware collection.
# After the Holorouter is deployed and reachable, it is also added here so
# that subsequent tasks can SSH in and run PowerShell directly.
# =============================================================================

[localhost]
localhost ansible_connection=local

[holorouter]
# Uncomment and update once the Holorouter VM is live:
# holorouter.lab.example.com ansible_host=192.168.1.10 ansible_user=root ansible_port=22

[holorouter:vars]
ansible_python_interpreter=/usr/bin/python3
