---
# ---------------------------------------------------------------------------
# Cloudflare Tunnel (cloudflared) — role tasks
# ---------------------------------------------------------------------------

# -- Prerequisites -----------------------------------------------------------

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# -- Cloudflare apt repository -----------------------------------------------

- name: Download Cloudflare GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg |
      gpg --yes --dearmor --output {{ cloudflared_gpg_keyring }}
    creates: "{{ cloudflared_gpg_keyring }}"

- name: Set correct permissions on GPG keyring
  ansible.builtin.file:
    path: "{{ cloudflared_gpg_keyring }}"
    owner: root
    group: root
    mode: "0644"

- name: Add cloudflared apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ cloudflared_gpg_keyring }}]
      https://pkg.cloudflare.com/cloudflared
      {{ ansible_distribution_release }} main
    filename: cloudflared
    state: present
    update_cache: true

# -- Package install ---------------------------------------------------------

- name: Install cloudflared
  ansible.builtin.apt:
    name: cloudflared
    state: present
  notify: Restart cloudflared

# -- Tunnel service install --------------------------------------------------

- name: Check if cloudflared service is already installed
  ansible.builtin.stat:
    path: /etc/cloudflared/config.yml
  register: cloudflared_config

- name: Install cloudflared tunnel service
  ansible.builtin.command: cloudflared service install {{ cloudflare_tunnel_token }}
  when: not cloudflared_config.stat.exists
  no_log: true  # token is sensitive

# -- Service -----------------------------------------------------------------

- name: Enable and start cloudflared service
  ansible.builtin.systemd:
    name: "{{ cloudflared_service }}"
    enabled: true
    state: started
    daemon_reload: true

# -- Verify ------------------------------------------------------------------

- name: Get cloudflared service status
  ansible.builtin.command: systemctl is-active cloudflared
  register: cloudflared_status
  changed_when: false
  failed_when: false

- name: Show cloudflared service status
  ansible.builtin.debug:
    msg: "cloudflared service is: {{ cloudflared_status.stdout }}"

- name: Assert cloudflared is running
  ansible.builtin.assert:
    that: cloudflared_status.stdout == "active"
    fail_msg: "cloudflared service is not active. Run 'systemctl status cloudflared' on the host to investigate."
    success_msg: "cloudflared tunnel is running."
