---
# ---------------------------------------------------------------------------
# Cloudflare Tunnel (cloudflared) — deploy playbook
#
# Runs against every host in the Semaphore inventory (hosts: all).
# Limit via Semaphore's "Limit" field if the inventory has more than one host.
#
# Variables (pass via Semaphore Variable Group or -e on CLI):
#   cloudflare_tunnel_token   Token from Zero Trust → Networks → Tunnels
#                             (mark as secret in Semaphore)
# ---------------------------------------------------------------------------

- name: Deploy Cloudflare Tunnel
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Verify token is set
      ansible.builtin.assert:
        that:
          - cloudflare_tunnel_token is defined
          - cloudflare_tunnel_token | length > 0
        fail_msg: >
          cloudflare_tunnel_token is not set. Pass it via Semaphore Variable Group
          (marked secret) or with -e cloudflare_tunnel_token=...

    - name: Verify Ubuntu is the target OS
      ansible.builtin.assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook targets Ubuntu. Found: {{ ansible_distribution }}"

  roles:
    - cloudflare_tunnel
