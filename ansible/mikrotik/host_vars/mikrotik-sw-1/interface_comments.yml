# Static interface comments — applied after the LLDP pass and win on conflicts.
# Use for devices that don't advertise LLDP/CDP (e.g. TrueNAS SCALE) or where
# you want a friendlier label than the device's broadcast hostname.
#
# Format: <interface-name>: "<comment text>"
# Comments here are written verbatim — no prefix is added.

static_interface_comments:
  # TrueNAS server (no LLDP advertisement) — confirmed 2026-07-01. Two NICs:
  # one on NFS-Storage (VLAN 60), one on iscsi2-Legacy (VLAN 61).
  qsfp28-1-4: "TrueNAS (NFS)"
  qsfp28-2-4: "TrueNAS (iSCSI)"

  # Cleared 2026-07-01 pending a physical port re-map — the previous entries
  # (Z840-1/2, StoreServ1/2, UniFi ports) were found to be stale after
  # discovering qsfp28-2-2 actually carries uk-bhr-p-ntnx-1, not Z840-1.
  # Re-add entries here only for devices confirmed not to advertise LLDP/CDP,
  # once the live port map is verified against reality.
