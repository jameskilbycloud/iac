---
- name: Ensure controller has librouteros
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Install librouteros pip package
      ansible.builtin.pip:
        name: librouteros
        state: present

- name: Update Mikrotik interface comments from LLDP/discovery neighbours
  hosts: mikrotik
  gather_facts: false

  module_defaults:
    group/community.routeros.api:
      hostname: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      tls: false
      validate_certs: false

  vars:
    comment_prefix: "{{ comment_prefix | default('LLDP') }}"
    skip_interfaces: "{{ skip_interfaces | default(['lo', 'bridge', 'vlan']) }}"

  tasks:
    - name: Fetch discovery neighbours
      community.routeros.api:
        path: "ip neighbor"
      register: neighbours

    - name: Fetch interfaces
      community.routeros.api_info:
        path: interface
      register: interfaces

    - name: Build interface -> neighbour identity map
      ansible.builtin.set_fact:
        neighbour_map: >-
          {{
            dict(
              _items | map(attribute='interface')
              | zip(_items | map(attribute='identity'))
            )
          }}
      vars:
        _items: >-
          {{
            neighbours.msg
            | selectattr('interface', 'defined')
            | selectattr('identity', 'defined')
            | rejectattr('identity', 'equalto', '')
            | list
          }}

    - name: Update interface comment from neighbour identity
      community.routeros.api_find_and_modify:
        path: interface
        find:
          name: "{{ item['name'] }}"
        values:
          comment: "{{ comment_prefix }}: {{ neighbour_map[item['name']] }}"
      loop: "{{ interfaces.result }}"
      loop_control:
        label: "{{ item['name'] }}"
      when:
        - item['name'] in (neighbour_map | default({}))
        - item['name'] | regex_search('^(' + skip_interfaces | join('|') + ')') == none
