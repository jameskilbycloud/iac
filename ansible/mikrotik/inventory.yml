---
all:
  children:
    # Alias so playbooks targeting "mikrotik" (and the SemaphoreUI static
    # inventory, which uses that group name) work with this inventory too.
    mikrotik:
      children:
        mikrotik_switches: {}
    mikrotik_switches:
      hosts:
        mikrotik-sw-1:
          ansible_host: 192.168.3.1
        mikrotik-sw-2:
          ansible_host: 192.168.3.2
      vars:
        ansible_user: admin
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: community.routeros.routeros
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
